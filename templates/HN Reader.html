<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HN — Hacker News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:            oklch(0.975 0.008 75);
    --bg-panel:      oklch(0.970 0.007 75);
    --bg-sidebar:    oklch(0.960 0.009 75);
    --bg-card-hover: oklch(0.990 0.004 75);
    --border:        oklch(0.880 0.010 75);
    --border-subtle: oklch(0.920 0.007 75);
    --text:          oklch(0.18 0.012 75);
    --text-secondary:oklch(0.44 0.010 75);
    --text-tertiary: oklch(0.60 0.008 75);
    --accent:        oklch(0.60 0.15 42);
    --accent-light:  oklch(0.93 0.05 42);
    --accent-text:   oklch(0.52 0.15 42);
    --sidebar-w:     216px;
    --panel-w:       500px;
    --story-font:    15px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  @keyframes fadeSlideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideInRight { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
  @keyframes shimmer { 0% { background-position:-400px 0; } 100% { background-position:400px 0; } }
  .skeleton { background: linear-gradient(90deg, var(--border-subtle) 25%, var(--border) 50%, var(--border-subtle) 75%); background-size:800px 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
  a { color: inherit; }
  input, textarea, button { font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="hn-components.jsx"></script>
<script type="text/babel" src="hn-features.jsx"></script>
<script type="text/babel" src="hn-story.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">

const FEEDS = [
  { id:'top',  label:'Top Stories', icon:'▲', desc:'Best of today' },
  { id:'new',  label:'New',         icon:'◆', desc:'Latest submissions' },
  { id:'best', label:'Best',        icon:'★', desc:'All-time best' },
  { id:'ask',  label:'Ask HN',      icon:'?', desc:'Questions & discussions' },
  { id:'show', label:'Show HN',     icon:'◎', desc:'What people built' },
  { id:'job',  label:'Jobs',        icon:'◈', desc:'Hiring & opportunities' },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "showDomain": true,
  "accentHue": 42,
  "fontSize": 15,
  "panelWidth": 500
}/*EDITMODE-END*/;

// ─── Sidebar ──────────────────────────────────────────────
function Sidebar({ feed, setFeed, user, onLogin, onProfile, onSubmit, onBookmarks, onReadLater, onShortcuts, bookmarkCount, readLaterCount }) {
  return (
    <nav style={{
      width: 'var(--sidebar-w)', flexShrink: 0,
      background: 'var(--bg-sidebar)', borderRight: '1px solid var(--border)',
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      {/* Logo */}
      <div style={{ padding: '18px 16px 14px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
          <div style={{ width: 26, height: 26, background: 'var(--accent)', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: 'white', fontFamily: 'DM Mono', flexShrink: 0 }}>Y</div>
          <span style={{ fontFamily: 'Newsreader', fontSize: 17, fontWeight: 400, color: 'var(--text)' }}>Hacker News</span>
        </div>
      </div>

      {/* Feed nav */}
      <div style={{ padding: '10px 8px', flex: 1, overflowY: 'auto' }}>
        <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.09em', textTransform: 'uppercase', color: 'var(--text-tertiary)', padding: '4px 10px 6px' }}>Feeds</div>
        {FEEDS.map(f => (
          <button key={f.id} onClick={() => setFeed(f.id)} style={{
            display: 'flex', alignItems: 'center', gap: 9, width: '100%',
            padding: '8px 10px', borderRadius: 8, border: 'none', cursor: 'pointer',
            background: feed===f.id ? 'var(--accent-light)' : 'transparent',
            color: feed===f.id ? 'var(--accent-text)' : 'var(--text-secondary)',
            fontSize: 13, fontWeight: feed===f.id ? 600 : 400,
            transition: 'all 0.12s', textAlign: 'left', marginBottom: 1,
          }}>
            <span style={{ fontFamily: 'DM Mono', fontSize: 10, width: 14, textAlign: 'center', opacity: 0.85 }}>{f.icon}</span>
            {f.label}
          </button>
        ))}

        {/* Lists section */}
        <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.09em', textTransform: 'uppercase', color: 'var(--text-tertiary)', padding: '14px 10px 6px' }}>My Lists</div>
        {[
          { label: 'Bookmarks', icon: '🔖', count: bookmarkCount, onClick: onBookmarks },
          { label: 'Read Later', icon: '📖', count: readLaterCount, onClick: onReadLater },
        ].map(item => (
          <button key={item.label} onClick={item.onClick} style={{
            display: 'flex', alignItems: 'center', gap: 9, width: '100%',
            padding: '8px 10px', borderRadius: 8, border: 'none', cursor: 'pointer',
            background: 'transparent', color: 'var(--text-secondary)',
            fontSize: 13, fontWeight: 400, transition: 'all 0.12s', textAlign: 'left', marginBottom: 1,
          }}>
            <span style={{ fontSize: 13, width: 14, textAlign: 'center' }}>{item.icon}</span>
            <span style={{ flex: 1 }}>{item.label}</span>
            {item.count > 0 && <HNBadge variant="accent">{item.count}</HNBadge>}
          </button>
        ))}

        {/* Extensions section (placeholders for user to build) */}
        <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.09em', textTransform: 'uppercase', color: 'var(--text-tertiary)', padding: '14px 10px 6px' }}>Extensions</div>
        {[
          { label: 'Digest', icon: '📰', badge: 'soon' },
          { label: 'Notifications', icon: '🔔', badge: 'soon' },
          { label: 'Tags & Labels', icon: '🏷️', badge: 'soon' },
          { label: 'Analytics', icon: '📊', badge: 'soon' },
        ].map(item => (
          <button key={item.label} onClick={() => showToast(`${item.label} — connect your backend to enable`, 'info')} style={{
            display: 'flex', alignItems: 'center', gap: 9, width: '100%',
            padding: '8px 10px', borderRadius: 8, border: 'none', cursor: 'pointer',
            background: 'transparent', color: 'var(--text-tertiary)',
            fontSize: 13, fontWeight: 400, transition: 'all 0.12s', textAlign: 'left', marginBottom: 1,
            opacity: 0.7,
          }}>
            <span style={{ fontSize: 13, width: 14, textAlign: 'center' }}>{item.icon}</span>
            <span style={{ flex: 1 }}>{item.label}</span>
            <HNBadge variant="default" size="xs">{item.badge}</HNBadge>
          </button>
        ))}
      </div>

      {/* Bottom: user + shortcuts */}
      <div style={{ borderTop: '1px solid var(--border)', flexShrink: 0 }}>
        <button onClick={onShortcuts} style={{
          display: 'flex', alignItems: 'center', gap: 9, width: '100%',
          padding: '8px 16px', border: 'none', cursor: 'pointer',
          background: 'transparent', color: 'var(--text-tertiary)', fontSize: 12,
          transition: 'color 0.12s', textAlign: 'left',
        }}>
          <HNKbd keys={['?']} />
          <span>Keyboard shortcuts</span>
        </button>
        {user ? (
          <button onClick={onProfile} style={{
            display: 'flex', alignItems: 'center', gap: 10, width: '100%',
            padding: '10px 14px 12px', border: 'none', cursor: 'pointer',
            background: 'transparent', transition: 'background 0.12s', textAlign: 'left',
          }}>
            <HNAvatar username={user.username} size="sm" />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{user.username}</div>
              <div style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>{user.karma} karma</div>
            </div>
          </button>
        ) : (
          <button onClick={onLogin} style={{
            display: 'flex', alignItems: 'center', gap: 9, width: '100%',
            padding: '12px 14px', border: 'none', cursor: 'pointer',
            background: 'transparent', color: 'var(--text-secondary)', fontSize: 13,
            transition: 'color 0.12s', textAlign: 'left',
          }}>
            <div style={{ width: 26, height: 26, borderRadius: '50%', border: '1.5px dashed var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, color: 'var(--text-tertiary)', flexShrink: 0 }}>↗</div>
            Sign in
          </button>
        )}
      </div>
    </nav>
  );
}

// ─── SkeletonRow ──────────────────────────────────────────
function SkeletonRow({ delay=0 }) {
  return (
    <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border-subtle)', display: 'flex', gap: 12, opacity: 0, animation: `fadeSlideUp 0.4s ease forwards ${delay}ms` }}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, minWidth: 36 }}>
        <div className="skeleton" style={{ width: 18, height: 12 }} />
        <div className="skeleton" style={{ width: 28, height: 14 }} />
      </div>
      <div style={{ flex: 1 }}>
        <div className="skeleton" style={{ height: 14, width: `${55+Math.random()*30}%`, marginBottom: 10 }} />
        <div className="skeleton" style={{ height: 11, width: '32%' }} />
      </div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const density    = tweaks.density || 'comfortable';
  const accentHue  = tweaks.accentHue || 42;
  const fontSize   = tweaks.fontSize || 15;
  const panelWidth = tweaks.panelWidth || 500;

  // Feed state
  const [feed, setFeed]         = React.useState('top');
  const [allIds, setAllIds]     = React.useState([]);
  const [stories, setStories]   = React.useState([]);
  const [loadingFeed, setLoadingFeed] = React.useState(true);
  const [page, setPage]         = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [searchMode, setSearchMode] = React.useState(false);
  const [searchResults, setSearchResults] = React.useState([]);
  const PER_PAGE = 30;

  // Auth
  const [user, setUser] = React.useState(() => loadAuth());

  // Interaction state (localStorage-backed)
  const [upvoted,    setUpvoted]    = React.useState(() => loadSet('hn_upvoted'));
  const [bookmarks,  setBookmarks]  = React.useState(() => loadMap('hn_bookmarks'));
  const [readLater,  setReadLater]  = React.useState(() => loadMap('hn_readlater'));
  const [hidden,     setHidden]     = React.useState(() => loadSet('hn_hidden'));

  // Modal/panel states
  const [showLogin,     setShowLogin]     = React.useState(false);
  const [showProfile,   setShowProfile]   = React.useState(false);
  const [showSubmit,    setShowSubmit]    = React.useState(false);
  const [showBookmarks, setShowBookmarks] = React.useState(false);
  const [showReadLater, setShowReadLater] = React.useState(false);
  const [showShortcuts, setShowShortcuts] = React.useState(false);

  // Selected story index for keyboard nav
  const [focusedIdx, setFocusedIdx] = React.useState(0);
  const storyListRef = React.useRef(null);

  // ── Load feed IDs ────────────────────────────────────────
  React.useEffect(() => {
    setLoadingFeed(true); setStories([]); setPage(0); setSelected(null); setSearchMode(false);
    fetch(`${HN_BASE}/${feed}stories.json`)
      .then(r => r.json()).then(ids => setAllIds(ids || []));
  }, [feed]);

  // ── Load stories for current page ────────────────────────
  React.useEffect(() => {
    if (!allIds.length) return;
    setLoadingFeed(true);
    const slice = allIds.slice(page * PER_PAGE, (page+1) * PER_PAGE);
    Promise.all(slice.map(id => fetch(`${HN_BASE}/item/${id}.json`).then(r=>r.json())))
      .then(data => {
        setStories(prev => page === 0 ? data.filter(Boolean) : [...prev, ...data.filter(Boolean)]);
        setLoadingFeed(false);
      });
  }, [allIds, page]);

  // ── Keyboard shortcuts ────────────────────────────────────
  React.useEffect(() => {
    const displayedStories = searchMode ? searchResults : stories;
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      switch(e.key) {
        case 'j': setFocusedIdx(i => Math.min(i+1, displayedStories.length-1)); break;
        case 'k': setFocusedIdx(i => Math.max(i-1, 0)); break;
        case 'Enter': if (displayedStories[focusedIdx]) setSelected(displayedStories[focusedIdx]); break;
        case 'o': if (displayedStories[focusedIdx]?.url) window.open(displayedStories[focusedIdx].url,'_blank'); break;
        case 'u': if (displayedStories[focusedIdx]) toggleUpvote(displayedStories[focusedIdx].id); break;
        case 'b': if (displayedStories[focusedIdx]) toggleBookmark(displayedStories[focusedIdx]); break;
        case 'r': if (displayedStories[focusedIdx]) toggleReadLater(displayedStories[focusedIdx]); break;
        case 'h': if (displayedStories[focusedIdx]) hideStory(displayedStories[focusedIdx].id); break;
        case 'n': if (user) setShowSubmit(true); else setShowLogin(true); break;
        case '?': setShowShortcuts(true); break;
        case '/': e.preventDefault(); document.querySelector('.hn-search-input')?.focus(); break;
        case 'Escape': setSelected(null); break;
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [stories, searchResults, searchMode, focusedIdx, user]);

  // ── Actions ────────────────────────────────────────────
  const toggleUpvote = (id) => {
    if (!user) { showToast('Sign in to vote', 'info'); return; }
    setUpvoted(prev => {
      const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id);
      saveSet('hn_upvoted', next); return next;
    });
    showToast(upvoted.has(id) ? 'Vote removed' : '▲ Upvoted', 'success');
  };
  const toggleBookmark = (story) => {
    setBookmarks(prev => {
      const next = new Map(prev);
      next.has(story.id) ? (next.delete(story.id), showToast('Bookmark removed', 'info')) : (next.set(story.id, story), showToast('🔖 Bookmarked', 'success'));
      saveMap('hn_bookmarks', next); return next;
    });
  };
  const toggleReadLater = (story) => {
    setReadLater(prev => {
      const next = new Map(prev);
      next.has(story.id) ? (next.delete(story.id), showToast('Removed from queue', 'info')) : (next.set(story.id, story), showToast('📖 Added to Read Later', 'success'));
      saveMap('hn_readlater', next); return next;
    });
  };
  const hideStory = (id) => {
    setHidden(prev => { const next = new Set(prev); next.add(id); saveSet('hn_hidden', next); return next; });
    if (selected?.id === id) setSelected(null);
    showToast('Story hidden', 'info');
  };

  const displayedStories = searchMode ? searchResults : stories;
  const currentFeed = FEEDS.find(f => f.id === feed);

  return (
    <div style={{
      display: 'flex', height: '100vh', overflow: 'hidden',
      '--story-font': `${fontSize}px`,
      '--accent':       `oklch(0.60 0.15 ${accentHue})`,
      '--accent-light': `oklch(0.93 0.05 ${accentHue})`,
      '--accent-text':  `oklch(0.52 0.15 ${accentHue})`,
      '--panel-w':      `${panelWidth}px`,
    }}>
      <Sidebar
        feed={feed} setFeed={setFeed}
        user={user}
        onLogin={() => setShowLogin(true)}
        onProfile={() => setShowProfile(true)}
        onSubmit={() => user ? setShowSubmit(true) : setShowLogin(true)}
        onBookmarks={() => setShowBookmarks(true)}
        onReadLater={() => setShowReadLater(true)}
        onShortcuts={() => setShowShortcuts(true)}
        bookmarkCount={bookmarks.size}
        readLaterCount={readLater.size}
      />

      {/* Center: story feed */}
      <main style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Topbar */}
        <div style={{ padding: '12px 20px', borderBottom: '1px solid var(--border)', flexShrink: 0, display: 'flex', gap: 12, alignItems: 'center' }}>
          <div style={{ flex: 1 }}>
            <SearchBar
              style={{ /* className added below */ }}
              onResults={r => { setSearchResults(r); setSearchMode(true); }}
              onClear={() => { setSearchMode(false); setSearchResults([]); }}
            />
          </div>
          <HNButton
            variant="secondary" size="sm"
            onClick={() => user ? setShowSubmit(true) : setShowLogin(true)}
            icon={<span style={{ fontSize: 14, lineHeight: 1 }}>+</span>}
          >Submit</HNButton>
        </div>

        {/* Feed label */}
        <div style={{ padding: '10px 20px 8px', borderBottom: '1px solid var(--border-subtle)', flexShrink: 0, display: 'flex', alignItems: 'center', gap: 10 }}>
          {searchMode ? (
            <>
              <span style={{ fontFamily: 'Newsreader', fontSize: 16, color: 'var(--text)' }}>Search results</span>
              <HNBadge variant="accent">{searchResults.length}</HNBadge>
            </>
          ) : (
            <>
              <span style={{ fontFamily: 'Newsreader', fontSize: 16, color: 'var(--text)' }}>{currentFeed?.label}</span>
              <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{currentFeed?.desc}</span>
              {allIds.length > 0 && <HNBadge variant="default">{stories.length} / {allIds.length.toLocaleString()}</HNBadge>}
            </>
          )}
        </div>

        {/* Story list */}
        <div ref={storyListRef} style={{ flex: 1, overflowY: 'auto' }}>
          {loadingFeed && stories.length === 0 ? (
            Array.from({length: 18}).map((_,i) => <SkeletonRow key={i} delay={i*25} />)
          ) : displayedStories.length === 0 ? (
            <HNEmptyState icon="○" title="No stories found" description="Try a different search or feed." />
          ) : (
            <>
              {displayedStories.map((s, i) => (
                <StoryCard
                  key={s.id} story={s} index={i}
                  selected={selected?.id === s.id}
                  upvoted={upvoted.has(s.id)}
                  bookmarked={bookmarks.has(s.id)}
                  readLater={readLater.has(s.id)}
                  hidden={hidden.has(s.id)}
                  density={density}
                  user={user}
                  onSelect={setSelected}
                  onUpvote={toggleUpvote}
                  onBookmark={toggleBookmark}
                  onReadLater={toggleReadLater}
                  onHide={hideStory}
                />
              ))}
              {!searchMode && allIds.length > (page+1)*PER_PAGE && (
                <div style={{ padding: '20px 24px 40px', textAlign: 'center' }}>
                  <HNButton variant="secondary" onClick={() => setPage(p=>p+1)} loading={loadingFeed}>
                    Load more stories
                  </HNButton>
                </div>
              )}
              {searchMode && (
                <div style={{ padding: '20px 24px', textAlign: 'center', fontSize: 12, color: 'var(--text-tertiary)' }}>
                  Powered by Algolia HN Search
                </div>
              )}
            </>
          )}
        </div>
      </main>

      {/* Detail panel */}
      {selected && (
        <DetailPanel
          story={selected} onClose={() => setSelected(null)}
          user={user}
          upvoted={upvoted.has(selected.id)} onUpvote={toggleUpvote}
          bookmarked={bookmarks.has(selected.id)} onBookmark={toggleBookmark}
          readLater={readLater.has(selected.id)} onReadLater={toggleReadLater}
        />
      )}

      {/* Modals & sheets */}
      <LoginModal open={showLogin} onClose={() => setShowLogin(false)} onLogin={setUser} />
      <SubmitModal open={showSubmit} onClose={() => setShowSubmit(false)} user={user} />
      <UserProfileModal
        open={showProfile} onClose={() => setShowProfile(false)}
        user={user}
        stats={{ bookmarks: bookmarks.size, readLater: readLater.size }}
        onLogout={() => { setUser(null); saveAuth(null); showToast('Signed out', 'info'); }}
      />
      <BookmarksPanel
        open={showBookmarks} onClose={() => setShowBookmarks(false)}
        bookmarks={bookmarks} onRemove={id => toggleBookmark({id})}
        onOpen={s => setSelected(s)}
      />
      <ReadLaterPanel
        open={showReadLater} onClose={() => setShowReadLater(false)}
        readLater={readLater} onRemove={id => toggleReadLater({id})}
        onOpen={s => setSelected(s)}
      />
      <KeyboardShortcutsModal open={showShortcuts} onClose={() => setShowShortcuts(false)} />

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection title="Reading">
          <TweakSlider id="fontSize" label="Story font size" min={12} max={20} step={1} />
          <TweakRadio id="density" label="Density" options={['compact','comfortable','spacious']} />
          <TweakToggle id="showDomain" label="Show domain badges" />
        </TweakSection>
        <TweakSection title="Appearance">
          <TweakSlider id="accentHue" label="Accent hue" min={0} max={360} step={5} />
          <TweakSlider id="panelWidth" label="Detail panel width" min={360} max={720} step={20} />
        </TweakSection>
      </TweaksPanel>

      <HNToastContainer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
